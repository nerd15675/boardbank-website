<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BoardBank Support</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<header>

<nav class="navbar">

<div class="logo">
    <a href="index.html">
        <img src="Images/logo.png" alt="BoardBank Logo">
    </a>
</div>

<div class="nav-links">

    <a href="#features">Features</a>

    <a href="#screenshots">Screenshots</a>

    <a href="#faq">FAQ</a>

    <a href="#download">Download</a>

    <a href="privacy.html">Privacy</a>

    <a href="support.html">Support</a>

</div>

</nav>

</header>


<section>

<h1>Need Help?</h1>

<p class="section-description">
Whether you've found a bug, have a question, or have an idea for BoardBank,
we'd love to hear from you.
</p>


<form
id="supportForm"
action="https://formspree.io/f/xkodoeaq"
method="POST"
class="support-form">

<label>Name</label>

<input
type="text"
name="name"
required>


<label>Email</label>

<input
type="email"
name="email"
required>


<label>Subject</label>

<input
type="text"
name="subject"
required>


<label>Message</label>

<textarea
name="message"
rows="7"
required></textarea>


<input
    type="hidden"
    name="_next"
    value="http://127.0.0.1:5500/thanks.html">


<button
type="submit"
class="button primary">

Send Message

</button>

</form>


<p style="margin-top:40px;opacity:0.7;">
Or email us directly at
<strong>boardbank.support@gmail.com</strong>
</p>

</section>


<script>
const form = document.getElementById("supportForm");

form.addEventListener("submit", async function (event) {
    event.preventDefault();

    const data = new FormData(form);

    try {
        const response = await fetch(form.action, {
            method: "POST",
            body: data,
            headers: {
                "Accept": "application/json"
            }
        });

        if (response.ok) {
            window.location.href = "thanks.html";
        } else {
            alert("Sorry, your message couldn't be sent. Please try again.");
        }

    } catch (error) {
        alert("A network error occurred. Please try again.");
    }
});
</script>

</body>
</html>
